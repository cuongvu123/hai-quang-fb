# Dùng cho self-host trên VPS. Postgres local thay cho Supabase cloud nếu muốn.
services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: haiquang
      POSTGRES_USER: haiquang
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Cron chạy bằng tiện ích gọi HTTP nội bộ (thay cho Vercel Cron khi self-host)
  cron:
    image: alpine:3.20
    depends_on: [app]
    env_file: .env
    entrypoint: >
      sh -c "apk add --no-cache curl &&
      while true; do
        curl -s -H \"Authorization: Bearer $$CRON_SECRET\" http://app:3000/api/cron/crawl;
        curl -s -H \"Authorization: Bearer $$CRON_SECRET\" http://app:3000/api/cron/publish;
        sleep 300;
      done"
    restart: unless-stopped

volumes:
  pgdata:
